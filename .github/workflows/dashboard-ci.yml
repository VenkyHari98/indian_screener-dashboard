name: Dashboard CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  validate-dashboard:
    runs-on: windows-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Syntax check Python files
        shell: pwsh
        run: |
          python -m compileall -q server.py init_config.py integration_validate_scanners.py small_validation_runner.py

      - name: Launch dashboard stack
        shell: pwsh
        run: |
          cmd /c run_dashboard_one_click.bat

      - name: Verify backend health endpoint
        shell: pwsh
        run: |
          $ok = $false
          for ($i = 0; $i -lt 30; $i++) {
            try {
              $resp = Invoke-RestMethod -Uri "http://127.0.0.1:5050/health" -TimeoutSec 10
              if ($resp.success -eq $true) {
                $ok = $true
                break
              }
            } catch {
              Start-Sleep -Seconds 1
            }
            Start-Sleep -Seconds 1
          }

          if (-not $ok) {
            throw "Health check failed for http://127.0.0.1:5050/health"
          }

      - name: Stop dashboard stack
        if: always()
        shell: pwsh
        run: |
          cmd /c stop_dashboard_servers.bat --quiet
